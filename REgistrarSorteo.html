<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registrar Sorteo - Lucky-Win</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3211d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-white dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation Bar -->
<nav class="flex items-center bg-white dark:bg-background-dark p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">Registrar Sorteo</h2>
</nav>
<main class="max-w-2xl mx-auto w-full px-4 py-8">
<header class="mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight">Nuevo Sorteo</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Completa los detalles para crear tu próximo evento de rifa.</p>
</header>
<form class="space-y-6">
<!-- Raffle Name -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">
                        Nombre del Sorteo
                    </label>
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-14 px-4 text-base transition-all placeholder:text-slate-400" placeholder="Ej. Gran Rifa de Verano" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Date Picker -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">
                            Fecha del Sorteo
                        </label>
<div class="relative">
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-14 px-4 text-base transition-all" type="date"/>
</div>
</div>
<!-- Number of Participants -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">
                            Nro. de Participantes
                        </label>
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-14 px-4 text-base transition-all placeholder:text-slate-400" placeholder="Ej. 100" type="number"/>
</div>
</div>
<!-- Prize Description -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">
                        Descripción del Premio
                    </label>
<textarea class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary px-4 py-3 text-base transition-all placeholder:text-slate-400 resize-none" placeholder="Describe los premios que se entregarán..." rows="4"></textarea>
</div>
<!-- Decorative Illustration Card (Placeholder) -->
<div class="rounded-2xl bg-primary/5 dark:bg-primary/10 p-6 flex items-center gap-4 border border-primary/10">
<div class="bg-primary text-white p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<div>
<p class="text-primary font-bold">Consejo Lucky-Win</p>
<p class="text-slate-600 dark:text-slate-400 text-sm">Asegúrate de que el nombre sea llamativo para atraer más participantes.</p>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Crear Sorteo</span>
<span class="material-symbols-outlined">celebration</span>
</button>
<button class="w-full mt-4 text-slate-500 dark:text-slate-400 font-medium py-2 hover:text-slate-700 dark:hover:text-slate-200 transition-colors" type="button">
                        Cancelar
                    </button>
</div>
</form>
</main>
<!-- Image Decoration Section -->
<div class="mt-auto p-4 opacity-50">
<div class="h-1 bg-gradient-to-r from-transparent via-primary to-transparent rounded-full max-w-xs mx-auto"></div>
</div>
</div>
</body></html>
